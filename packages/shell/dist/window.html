<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visual Companion</title>
  <link rel="stylesheet" href="./window.css">
  <link rel="stylesheet" href="./xterm.css">
</head>
<body>
  <header class="titlebar">
    <div class="traffic-lights"></div>
    <button id="btn-back" class="nav-btn" title="Back" aria-label="Back">‹</button>
    <button id="btn-forward" class="nav-btn" title="Forward" aria-label="Forward">›</button>
    <button id="btn-reload" class="nav-btn" title="Reload (⌘R)" aria-label="Reload">↻</button>
    <div class="url-input-wrap"><input id="url-input" type="text" spellcheck="false"></div>
    <button id="btn-devtools" class="nav-btn" title="DevTools (rechtsklick → Inspect)" aria-label="DevTools">&lt;/&gt;</button>
    <button id="btn-settings" class="nav-btn" title="Settings" aria-label="Settings">⚙</button>
  </header>

  <main class="main">
    <section class="pane pane-left">
      <iframe id="app-frame" src="/app/" allow="clipboard-read; clipboard-write; fullscreen"></iframe>
      <div class="pill hint">⌘ halten zum Zeigen</div>
      <div class="pill status" id="proxy-status">● Proxy verbunden</div>
    </section>
    <div class="divider" id="divider"></div>
    <section class="pane pane-right">
      <div id="buffer-panel" class="buffer-panel is-empty" aria-label="Selected elements">
        <div class="buffer-chips" id="buffer-chips"></div>
      </div>
      <div id="terminal"></div>
    </section>
  </main>

  <footer class="statusbar">
    <span id="st-proxy">Proxy: — → —</span>
    <span id="st-events">Events: 0</span>
    <span id="st-mcp">MCP: —</span>
  </footer>

  <script type="module" src="./window.js"></script>
</body>
</html>
